<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set your password — DigiFriend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <style>
    body { background: var(--off-white); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; font-family: 'Plus Jakarta Sans', sans-serif; }
    .card {
      background: var(--white); border-radius: 20px; padding: 40px 32px;
      box-shadow: 0 8px 40px rgba(26,39,68,0.08); max-width: 420px; width: 100%;
    }
    .logo { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 28px; }
    .logo span { font-size: 1.3rem; font-weight: 800; }
    .logo .digi { color: var(--navy); } .logo .friend { color: var(--teal); }
    h1 { font-size: 1.35rem; font-weight: 800; color: var(--text); margin-bottom: 8px; text-align: center; letter-spacing: -0.02em; }
    .sub { font-size: 0.88rem; color: var(--text-mid); text-align: center; margin-bottom: 28px; line-height: 1.6; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--text-mid); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input {
      width: 100%; padding: 13px 14px; border: 1.5px solid var(--gray-200); border-radius: 12px;
      font-family: inherit; font-size: 16px; color: var(--text); outline: none; box-sizing: border-box;
    }
    .form-group input:focus { border-color: var(--teal); }
    .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--teal); color: var(--navy); font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
    .btn:hover { background: var(--teal-dark); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #error { display: none; background: #fff1f0; border: 1px solid #fca5a5; border-radius: 10px; padding: 12px 14px; font-size: 0.83rem; color: #b91c1c; margin-bottom: 16px; }
    #expired { display: none; text-align: center; font-size: 0.88rem; color: var(--text-mid); line-height: 1.7; }
    #expired a { color: var(--teal-dark); font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="logo-icon-navy.png" alt="DigiFriend" style="height:32px;width:auto;display:block;">
      <img src="wordmark-navy.png" alt="DigiFriend" style="height:26px;width:auto;display:block;">
    </div>

    <div id="form-state">
      <h1>Welcome to the team! 🎉</h1>
      <p class="sub">You've been approved as a DigiFriend.<br>Choose a password to activate your account.</p>
      <div id="error"></div>
      <div class="form-group">
        <label>New password</label>
        <input type="password" id="pw1" placeholder="At least 8 characters" autofocus>
      </div>
      <div class="form-group">
        <label>Repeat password</label>
        <input type="password" id="pw2" placeholder="Same password again">
      </div>
      <button class="btn" id="save-btn" onclick="savePassword()">Activate my account →</button>
    </div>

    <div id="expired">
      <h1>Link expired</h1>
      <p style="margin:16px 0 20px;">This invitation link is no longer valid.<br>Ask your DigiFriend contact to send a new one,<br>or try <a href="login.html">logging in</a> if you already have a password.</p>
    </div>
  </div>

  <script>
    // The invite link logs the user in automatically (token in URL).
    // Wait a moment for supabase-js to pick up the session, then verify.
    ;(async () => {
      await new Promise(r => setTimeout(r, 600))
      const { data: { session } } = await sb.auth.getSession()
      if (!session) {
        document.getElementById('form-state').style.display = 'none'
        document.getElementById('expired').style.display = 'block'
      }
    })()

    document.getElementById('pw2').addEventListener('keydown', e => { if (e.key === 'Enter') savePassword() })

    async function savePassword() {
      const pw1 = document.getElementById('pw1').value
      const pw2 = document.getElementById('pw2').value
      const err = document.getElementById('error')
      const btn = document.getElementById('save-btn')
      err.style.display = 'none'

      if (pw1.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.style.display = 'block'; return }
      if (pw1 !== pw2)    { err.textContent = 'The passwords do not match.'; err.style.display = 'block'; return }

      btn.disabled = true
      btn.textContent = 'Saving…'

      const { error } = await sb.auth.updateUser({ password: pw1 })

      if (error) {
        btn.disabled = false
        btn.textContent = 'Activate my account →'
        err.textContent = error.message
        err.style.display = 'block'
        return
      }

      window.location.href = 'digifriend-portal.html'
    }
  </script>
</body>
</html>
