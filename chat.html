<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - DigiFriend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <style>
    body { background: var(--off-white); overflow: hidden; }

    .app-nav {
      position: fixed; top: 0; left: 0; right: 0; height: 60px;
      background: var(--white); border-bottom: 1px solid var(--gray-200);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; z-index: 100;
    }
    .app-nav-logo { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .app-nav-logo span { font-size:1.1rem; font-weight:700; letter-spacing:-0.02em; }
    .app-nav-logo .digi { color:var(--text); }
    .app-nav-logo .friend { color:var(--teal); }
    .app-nav-links { display:flex; align-items:center; gap:4px; list-style:none; }
    .app-nav-links a { display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:10px; color:var(--text-mid); font-size:0.875rem; font-weight:500; transition:background 0.15s,color 0.15s; text-decoration:none; }
    .app-nav-links a:hover { background:var(--gray-100); color:var(--text); }
    .app-nav-links a.active { background:var(--teal-light); color:var(--teal-dark); font-weight:600; }
    .app-nav-right { display:flex; align-items:center; gap:10px; }
    .avatar-btn { width:34px; height:34px; border-radius:50%; background:var(--navy); color:var(--white); font-size:0.78rem; font-weight:700; border:none; cursor:pointer; }

    .chat-wrap { display:grid; grid-template-columns:300px 1fr; height:100vh; padding-top:60px; }

    /* ─── SIDEBAR ─── */
    .chat-sidebar { background:var(--white); border-right:1px solid var(--gray-200); display:flex; flex-direction:column; overflow:hidden; }
    .sidebar-header { padding:20px 20px 16px; border-bottom:1px solid var(--gray-100); flex-shrink:0; }
    .sidebar-header h2 { font-size:1.1rem; font-weight:800; letter-spacing:-0.02em; color:var(--text); }
    .conv-list { flex:1; overflow-y:auto; padding:8px 0; }
    .conv-item { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; transition:background 0.12s; }
    .conv-item:hover { background:var(--off-white); }
    .conv-item.active { background:var(--teal-light); }
    .conv-avatar { width:44px; height:44px; border-radius:50%; font-size:1rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:700; background:linear-gradient(135deg,#1a2744,#2e3f6e); color:var(--white); overflow:hidden; }
    .conv-avatar img { width:100%; height:100%; object-fit:cover; }
    .conv-info { flex:1; min-width:0; }
    .conv-name { font-size:0.9rem; font-weight:700; color:var(--text); margin-bottom:3px; }
    .conv-preview { font-size:0.8rem; color:var(--text-light); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .conv-meta { text-align:right; flex-shrink:0; }
    .conv-time { font-size:0.72rem; color:var(--text-light); }

    /* ─── MAIN ─── */
    .chat-main { display:flex; flex-direction:column; background:var(--off-white); overflow:hidden; }
    .chat-header { background:var(--white); border-bottom:1px solid var(--gray-200); padding:14px 24px; display:flex; align-items:center; gap:14px; flex-shrink:0; }
    .chat-header-avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#1a2744,#2e3f6e); color:var(--white); font-size:1rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
    .chat-header-avatar img { width:100%; height:100%; object-fit:cover; }
    .chat-header-name { font-size:1rem; font-weight:700; color:var(--text); }
    .chat-header-sub { font-size:0.78rem; color:var(--text-light); }
    .chat-header-actions { margin-left:auto; display:flex; gap:8px; }
    .chat-action-btn { padding:8px 16px; border-radius:10px; font-family:'Plus Jakarta Sans',sans-serif; font-size:0.82rem; font-weight:600; cursor:pointer; border:1.5px solid var(--gray-200); background:var(--white); color:var(--text); transition:all 0.15s; text-decoration:none; display:inline-flex; align-items:center; }
    .chat-action-btn:hover { border-color:var(--navy); }
    .chat-action-btn.primary { background:var(--teal); color:var(--navy); border-color:var(--teal); }
    .chat-action-btn.primary:hover { background:var(--teal-dark); }

    /* ─── NEXT CALL BANNER ─── */
    .next-call-banner { background:var(--navy); margin:14px 20px 0; border-radius:14px; padding:13px 18px; display:flex; align-items:center; gap:14px; flex-shrink:0; }
    .next-call-info { flex:1; }
    .next-call-label { font-size:0.65rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--teal); margin-bottom:2px; }
    .next-call-detail { font-size:0.82rem; color:rgba(255,255,255,0.8); font-weight:500; }
    .next-call-btn { padding:7px 14px; background:var(--teal); color:var(--navy); border:none; border-radius:8px; font-family:'Plus Jakarta Sans',sans-serif; font-size:0.78rem; font-weight:700; cursor:pointer; text-decoration:none; flex-shrink:0; }

    /* ─── MESSAGES ─── */
    .messages-wrap { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:14px; }
    .day-divider { text-align:center; font-size:0.68rem; color:var(--text-light); font-weight:600; letter-spacing:0.06em; text-transform:uppercase; margin:6px 0; }
    .msg-row { display:flex; align-items:flex-end; gap:10px; }
    .msg-row.mine { flex-direction:row-reverse; }
    .msg-avatar { width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,#1a2744,#2e3f6e); color:var(--white); font-size:0.7rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
    .msg-avatar img { width:100%; height:100%; object-fit:cover; }
    .msg-bubble { max-width:72%; padding:11px 15px; border-radius:18px; font-size:0.88rem; line-height:1.55; color:var(--text); }
    .msg-row:not(.mine) .msg-bubble { background:var(--white); border-radius:4px 18px 18px 18px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
    .msg-row.mine .msg-bubble { background:var(--navy); color:var(--white); border-radius:18px 4px 18px 18px; }
    .msg-time { font-size:0.65rem; color:var(--text-light); margin-top:4px; padding:0 4px; }
    .msg-row.mine .msg-time { text-align:right; }
    .msg-sending { opacity:0.5; }

    /* ─── INPUT ─── */
    .chat-input-wrap { background:var(--white); border-top:1px solid var(--gray-200); padding:14px 20px; flex-shrink:0; }
    .chat-input-row { display:flex; align-items:flex-end; gap:12px; background:var(--off-white); border:1.5px solid var(--gray-200); border-radius:16px; padding:10px 14px; transition:border-color 0.2s; }
    .chat-input-row:focus-within { border-color:var(--teal); }
    .chat-input-row textarea { flex:1; border:none; background:none; outline:none; font-family:'Plus Jakarta Sans',sans-serif; font-size:0.9rem; color:var(--text); resize:none; min-height:24px; max-height:120px; line-height:1.5; }
    .chat-input-row textarea::placeholder { color:var(--text-light); }
    .send-btn { width:36px; height:36px; border-radius:10px; background:var(--teal); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.15s; }
    .send-btn:hover { background:var(--teal-dark); }
    .input-hint { font-size:0.7rem; color:var(--text-light); margin-top:7px; text-align:center; }

    /* ─── EMPTY / LOADING ─── */
    .chat-empty { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; color:var(--text-light); }
    .chat-empty-icon { font-size:2.5rem; }
    .chat-empty-text { font-size:0.9rem; }

    /* ─── NO MATCH STATE ─── */
    .no-match-state { flex:1; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px; }
    .no-match-box { max-width:360px; }
    .no-match-icon { font-size:3rem; margin-bottom:16px; }

    @media (max-width:700px) {
      .chat-wrap { grid-template-columns:1fr; }
      .chat-sidebar { display:none; }
      .app-nav-links { display:none; }
    }
  </style>
</head>
<body>

  <nav class="app-nav">
    <a href="index.html" class="app-nav-logo">
      <img src="logo-icon-navy.png" alt="DigiFriend" style="height:32px;width:auto;display:block;">
      <img src="wordmark-navy.png" alt="DigiFriend" style="height:26px;width:auto;display:block;">
    </a>
    <ul class="app-nav-links">
      <li><a href="dashboard.html">🏠 Home</a></li>
      <li><a href="booking.html">📅 My calls</a></li>
      <li><a href="chat.html" class="active">💬 Messages</a></li>
      <li><a href="browse.html">🌍 Browse</a></li>
    </ul>
    <div class="app-nav-right">
      <button class="avatar-btn" id="avatar-btn">EM</button>
    </div>
  </nav>

  <div class="chat-wrap">
    <!-- SIDEBAR -->
    <div class="chat-sidebar">
      <div class="sidebar-header"><h2>Messages</h2></div>
      <div class="conv-list" id="conv-list">
        <div style="padding:20px;font-size:0.85rem;color:var(--text-light);">Loading…</div>
      </div>
    </div>

    <!-- MAIN CHAT -->
    <div class="chat-main" id="chat-main">
      <!-- populated by JS -->
      <div class="chat-empty" id="chat-loading">
        <div class="chat-empty-icon">💬</div>
        <div class="chat-empty-text">Loading messages…</div>
      </div>
    </div>
  </div>

<script>
  const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpb212amJxaWxvc3R0eW90bWNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NzM1ODAsImV4cCI6MjA5NzU0OTU4MH0.qoksq8dDRKqGgEZiPHbeM-S-cynlOoo1gnq7B6i1bfI'
  const API  = 'https://ciomvjbqilosttyotmcg.supabase.co/rest/v1'

  let authUser     = null
  let accessToken  = null
  let userInitials = 'ME'
  let dfRecord     = null       // matched DigiFriend record
  let realtimeSub  = null
  let msgChannel   = null

  function apiFetch(path, opts = {}) {
    return fetch(API + path, {
      ...opts,
      headers: {
        apikey: ANON,
        Authorization: `Bearer ${accessToken || ANON}`,
        'Content-Type': 'application/json',
        Prefer: 'return=representation',
        ...(opts.headers || {})
      }
    })
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')
  }

  function fmtTime(iso) {
    return new Date(iso).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' })
  }

  function fmtDay(iso) {
    const d = new Date(iso)
    const today = new Date()
    const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1)
    if (d.toDateString() === today.toDateString()) return 'Today'
    if (d.toDateString() === yesterday.toDateString()) return 'Yesterday'
    return d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' })
  }

  // ── INIT ────────────────────────────────────────────────────────────
  requireAuth().then(async user => {
    if (!user) return
    authUser    = user
    const { data: { session } } = await sb.auth.getSession()
    accessToken = session?.access_token

    const meta = user.user_metadata || {}
    const f = meta.first_name || ''
    const l = meta.last_name  || ''
    userInitials = ((f[0]||'') + (l[0]||'')).toUpperCase() || user.email[0].toUpperCase()
    document.getElementById('avatar-btn').textContent = userInitials

    // Look up match from matches table by member email
    const matchRes = await apiFetch(`/matches?member_email=eq.${encodeURIComponent(user.email)}&limit=1`)
    const matchRows = matchRes.ok ? await matchRes.json() : []
    const dfId = matchRows[0]?.digifriend_id
    if (!dfId) {
      renderNoMatch()
      return
    }

    // Load DigiFriend
    const dfRes  = await apiFetch(`/digifriends?id=eq.${dfId}&limit=1`)
    const dfRows = dfRes.ok ? await dfRes.json() : []
    if (!dfRows.length) { renderNoMatch(); return }
    dfRecord = dfRows[0]

    renderSidebar()
    await loadMessages()
    subscribeRealtime()
  })

  // ── SIDEBAR ──────────────────────────────────────────────────────────
  function renderSidebar() {
    const df = dfRecord
    const avatarHtml = df.photo_url
      ? `<img src="${df.photo_url}" alt="">`
      : (df.first_name?.[0] || df.name?.[0] || '?')
    document.getElementById('conv-list').innerHTML = `
      <div class="conv-item active">
        <div class="conv-avatar">${avatarHtml}</div>
        <div class="conv-info">
          <div class="conv-name">${df.first_name || df.name}${df.country ? ', ' + df.country : ''} ${df.flag || ''}</div>
          <div class="conv-preview" id="conv-preview">-</div>
        </div>
        <div class="conv-meta">
          <div class="conv-time" id="conv-time"></div>
        </div>
      </div>`
  }

  // ── LOAD MESSAGES ───────────────────────────────────────────────────
  async function loadMessages() {
    const res = await apiFetch(
      `/messages?member_id=eq.${authUser.id}&digifriend_id=eq.${dfRecord.id}&order=created_at.asc`
    )
    const msgs = res.ok ? await res.json() : []
    renderChatUI(msgs)
  }

  function renderChatUI(msgs) {
    const df = dfRecord
    const avatarHtml = df.photo_url ? `<img src="${df.photo_url}" alt="">` : (df.first_name?.[0] || '?')
    const dfName = `${df.first_name || df.name}${df.country ? ' from ' + df.country : ''}`

    document.getElementById('chat-main').innerHTML = `
      <div class="chat-header">
        <div class="chat-header-avatar">${df.photo_url ? `<img src="${df.photo_url}" alt="">` : avatarHtml}</div>
        <div>
          <div class="chat-header-name">${dfName}</div>
          <div class="chat-header-sub" id="online-status">DigiFriend</div>
        </div>
        <div class="chat-header-actions">
          <a href="profile.html?id=${df.id}" class="chat-action-btn">View profile</a>
          <a href="booking.html" class="chat-action-btn primary">📅 Book a call</a>
        </div>
      </div>
      <div class="next-call-banner" id="next-call-banner" style="display:none;">
        <div class="next-call-info">
          <div class="next-call-label">Next call</div>
          <div class="next-call-detail" id="next-call-detail">-</div>
        </div>
        <a href="booking.html" class="next-call-btn">View →</a>
      </div>
      <div class="messages-wrap" id="messages-wrap"></div>
      <div class="chat-input-wrap">
        <div class="chat-input-row">
          <textarea id="msg-input" placeholder="Write a message…" rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <div class="input-hint">Enter to send · Shift+Enter for new line</div>
      </div>`

    renderMessages(msgs)
    loadNextCall()
  }

  function renderMessages(msgs) {
    const wrap = document.getElementById('messages-wrap')
    if (!wrap) return
    if (msgs.length === 0) {
      wrap.innerHTML = `<div class="chat-empty"><div class="chat-empty-icon">👋</div><div class="chat-empty-text">No messages yet - say hello!</div></div>`
      return
    }

    const df = dfRecord
    const dfAvatarHtml = df.photo_url ? `<img src="${df.photo_url}" alt="">` : (df.first_name?.[0] || '?')

    let html = ''
    let lastDay = ''
    msgs.forEach(msg => {
      const day = fmtDay(msg.created_at)
      if (day !== lastDay) {
        html += `<div class="day-divider">${day}</div>`
        lastDay = day
      }
      const isMine = msg.sender_type === 'member'
      const avatarHtml = isMine
        ? `<div class="msg-avatar" style="background:linear-gradient(135deg,#00c9a7,#00a88c);color:#1a2744;">${userInitials}</div>`
        : `<div class="msg-avatar">${dfAvatarHtml}</div>`
      html += `
        <div class="msg-row${isMine ? ' mine' : ''}" id="msg-${msg.id}">
          ${avatarHtml}
          <div>
            <div class="msg-bubble">${escHtml(msg.body)}</div>
            <div class="msg-time">${fmtTime(msg.created_at)}</div>
          </div>
        </div>`
    })
    wrap.innerHTML = html
    wrap.scrollTop = wrap.scrollHeight

    // Update sidebar preview
    if (msgs.length > 0) {
      const last = msgs[msgs.length - 1]
      const prevEl = document.getElementById('conv-preview')
      const timeEl = document.getElementById('conv-time')
      if (prevEl) prevEl.textContent = last.body.slice(0, 50)
      if (timeEl) timeEl.textContent = fmtTime(last.created_at)
    }
  }

  // Append a single new message without full re-render
  function appendMessage(msg) {
    const wrap = document.getElementById('messages-wrap')
    if (!wrap) return

    // Remove "no messages" empty state if present
    const empty = wrap.querySelector('.chat-empty')
    if (empty) empty.remove()

    const df = dfRecord
    const isMine = msg.sender_type === 'member'
    const dfAvatarHtml = df.photo_url ? `<img src="${df.photo_url}" alt="">` : (df.first_name?.[0] || '?')
    const avatarHtml = isMine
      ? `<div class="msg-avatar" style="background:linear-gradient(135deg,#00c9a7,#00a88c);color:#1a2744;">${userInitials}</div>`
      : `<div class="msg-avatar">${dfAvatarHtml}</div>`

    const row = document.createElement('div')
    row.className = `msg-row${isMine ? ' mine' : ''}`
    row.id = `msg-${msg.id}`
    row.innerHTML = `
      ${avatarHtml}
      <div>
        <div class="msg-bubble">${escHtml(msg.body)}</div>
        <div class="msg-time">${fmtTime(msg.created_at)}</div>
      </div>`

    // Remove optimistic version if exists
    const optimistic = document.getElementById('msg-optimistic')
    if (optimistic) optimistic.remove()

    wrap.appendChild(row)
    wrap.scrollTop = wrap.scrollHeight

    // Update sidebar
    const prevEl = document.getElementById('conv-preview')
    const timeEl = document.getElementById('conv-time')
    if (prevEl) prevEl.textContent = msg.body.slice(0, 50)
    if (timeEl) timeEl.textContent = fmtTime(msg.created_at)
  }

  // ── REALTIME ────────────────────────────────────────────────────────
  function subscribeRealtime() {
    msgChannel = sb.channel(`messages:${authUser.id}:${dfRecord.id}`)
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'messages',
        filter: `member_id=eq.${authUser.id}`
      }, payload => {
        // Only show if not already rendered (optimistic message handles "mine")
        const existing = document.getElementById(`msg-${payload.new.id}`)
        if (!existing) appendMessage(payload.new)
      })
      .subscribe()
  }

  // ── SEND ────────────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('msg-input')
    if (!input) return
    const text = input.value.trim()
    if (!text || !dfRecord) return

    input.value = ''
    input.style.height = 'auto'

    // Optimistic UI
    const wrap = document.getElementById('messages-wrap')
    const empty = wrap?.querySelector('.chat-empty')
    if (empty) empty.remove()

    if (wrap) {
      const now = new Date().toISOString()
      const row = document.createElement('div')
      row.className = 'msg-row mine msg-sending'
      row.id = 'msg-optimistic'
      row.innerHTML = `
        <div class="msg-avatar" style="background:linear-gradient(135deg,#00c9a7,#00a88c);color:#1a2744;">${userInitials}</div>
        <div>
          <div class="msg-bubble">${escHtml(text)}</div>
          <div class="msg-time">${fmtTime(now)}</div>
        </div>`
      wrap.appendChild(row)
      wrap.scrollTop = wrap.scrollHeight
    }

    // Save to Supabase
    await apiFetch('/messages', {
      method: 'POST',
      body: JSON.stringify({
        member_id: authUser.id,
        digifriend_id: dfRecord.id,
        sender_id: authUser.id,
        sender_type: 'member',
        body: text
      })
    })

    // Remove sending state from optimistic bubble
    const opt = document.getElementById('msg-optimistic')
    if (opt) opt.classList.remove('msg-sending')
  }

  // ── NEXT CALL ───────────────────────────────────────────────────────
  async function loadNextCall() {
    const res = await apiFetch(
      `/calls?member_id=eq.${authUser.id}&status=eq.confirmed&order=scheduled_at.asc&limit=1`
    )
    const calls = res.ok ? await res.json() : []
    const next = calls[0]
    const banner = document.getElementById('next-call-banner')
    const detail = document.getElementById('next-call-detail')
    if (next && banner && detail) {
      const d = new Date(next.scheduled_at)
      const userTZ = Intl.DateTimeFormat().resolvedOptions().timeZone
      const dayStr = d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'short' })
      const timeStr = d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', timeZone: userTZ })
      detail.textContent = `${dayStr} · ${timeStr} (your time)`
      banner.style.display = 'flex'
    }
  }

  // ── NO MATCH ─────────────────────────────────────────────────────────
  function renderNoMatch() {
    document.getElementById('conv-list').innerHTML = `<div style="padding:20px;font-size:0.85rem;color:var(--text-light);">No conversations yet.</div>`
    document.getElementById('chat-main').innerHTML = `
      <div class="no-match-state">
        <div class="no-match-box">
          <div class="no-match-icon">🌍</div>
          <h3 style="font-size:1.2rem;font-weight:800;margin-bottom:10px;">No conversations yet</h3>
          <p style="font-size:0.88rem;color:var(--text-mid);line-height:1.65;margin-bottom:24px;">Once you're matched with a DigiFriend, you can message them here.</p>
          <a href="browse.html" class="btn btn-teal">Browse DigiFriends →</a>
        </div>
      </div>`
  }

  // ── HELPERS ──────────────────────────────────────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
  }
  function autoResize(el) {
    el.style.height = 'auto'
    el.style.height = Math.min(el.scrollHeight, 120) + 'px'
  }
</script>
</body>
