<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — DigiFriend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <style>
    body {
      background: var(--off-white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .reset-card {
      background: var(--white);
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(26,39,68,0.10);
      text-align: center;
    }

    .reset-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
      text-decoration: none;
    }

    .reset-icon {
      width: 60px;
      height: 60px;
      background: var(--teal-light);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin: 0 auto 24px;
    }

    .reset-card h2 {
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 10px;
    }

    .reset-card p {
      font-size: 0.9rem;
      color: var(--text-mid);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .reset-form { text-align: left; }

    .reset-submit { margin-top: 8px; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
      color: var(--text-light);
    }

    .back-link a { color: var(--navy); font-weight: 600; }

    .success-box {
      background: var(--teal-light);
      border: 1px solid var(--teal-mid);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 24px;
      font-size: 0.88rem;
      color: var(--teal-dark);
      line-height: 1.6;
      text-align: left;
    }

    .error-box {
      background: #fff1f0;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #b91c1c;
      margin-bottom: 16px;
      text-align: left;
    }

    @media (max-width: 480px) {
      .reset-card { padding: 40px 28px; }
    }
  </style>
</head>
<body>

  <!-- REQUEST RESET — shown by default -->
  <div class="reset-card" id="panel-request">
    <a href="index.html" class="reset-logo">
      <img src="logo-icon-navy.png" alt="DigiFriend" style="height:32px;width:auto;display:block;">
      <img src="wordmark-navy.png" alt="DigiFriend" style="height:26px;width:auto;display:block;">
    </a>

    <div class="reset-icon">🔑</div>
    <h2>Forgot your password?</h2>
    <p>No problem. Enter your email and we'll send you a link to set a new one.</p>

    <div class="reset-form">
      <div id="request-error" class="error-box" style="display:none;"></div>
      <div id="request-success" class="success-box" style="display:none;">
        ✅ Check your inbox — we've sent a reset link to <strong id="sent-to"></strong>. It may take a minute or two to arrive.
      </div>

      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="reset-email" placeholder="your@email.com" autofocus>
      </div>

      <div class="reset-submit">
        <button id="request-btn" class="btn btn-teal btn-lg btn-block" onclick="handleRequestReset()">
          Send reset link
        </button>
      </div>
    </div>

    <p class="back-link">Remembered it? <a href="login.html">Back to login</a></p>
  </div>

  <!-- SET NEW PASSWORD — shown when user arrives from email link -->
  <div class="reset-card" id="panel-update" style="display:none;">
    <a href="index.html" class="reset-logo">
      <img src="logo-icon-navy.png" alt="DigiFriend" style="height:32px;width:auto;display:block;">
      <img src="wordmark-navy.png" alt="DigiFriend" style="height:26px;width:auto;display:block;">
    </a>

    <div class="reset-icon">🔒</div>
    <h2>Set a new password</h2>
    <p>Choose something strong that you haven't used before.</p>

    <div class="reset-form">
      <div id="update-error" class="error-box" style="display:none;"></div>

      <div class="form-group">
        <label>New password</label>
        <input type="password" id="new-password" placeholder="Min. 8 characters">
      </div>

      <div class="form-group">
        <label>Confirm new password</label>
        <input type="password" id="confirm-password" placeholder="Repeat your new password">
      </div>

      <div class="reset-submit">
        <button id="update-btn" class="btn btn-teal btn-lg btn-block" onclick="handleUpdatePassword()">
          Update password
        </button>
      </div>
    </div>
  </div>

<script>
  // Detect if user arrived via a recovery link (Supabase puts tokens in the URL hash)
  if (sb) {
    sb.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        document.getElementById('panel-request').style.display = 'none'
        document.getElementById('panel-update').style.display = 'block'
      }
    })
  }

  async function handleRequestReset() {
    const email = document.getElementById('reset-email').value.trim()
    const btn   = document.getElementById('request-btn')
    const errEl = document.getElementById('request-error')
    const succEl = document.getElementById('request-success')

    errEl.style.display = 'none'
    succEl.style.display = 'none'

    if (!email) { showRequestError('Please enter your email address.'); return }

    btn.textContent = 'Sending…'
    btn.disabled = true

    const { error } = await requestPasswordReset(email)

    if (error) {
      showRequestError(error.message)
      btn.textContent = 'Send reset link'
      btn.disabled = false
    } else {
      document.getElementById('sent-to').textContent = email
      succEl.style.display = 'block'
      btn.textContent = 'Sent ✓'
    }
  }

  async function handleUpdatePassword() {
    const newPass     = document.getElementById('new-password').value
    const confirmPass = document.getElementById('confirm-password').value
    const btn         = document.getElementById('update-btn')
    const errEl       = document.getElementById('update-error')

    errEl.style.display = 'none'

    if (newPass.length < 8)       { showUpdateError('Password must be at least 8 characters.'); return }
    if (newPass !== confirmPass)  { showUpdateError('Passwords don\'t match. Please try again.'); return }

    btn.textContent = 'Updating…'
    btn.disabled = true

    const { error } = await updatePassword(newPass)

    if (error) {
      showUpdateError(error.message)
      btn.textContent = 'Update password'
      btn.disabled = false
    } else {
      window.location.href = 'dashboard.html'
    }
  }

  function showRequestError(msg) {
    const el = document.getElementById('request-error')
    el.textContent = msg
    el.style.display = 'block'
  }

  function showUpdateError(msg) {
    const el = document.getElementById('update-error')
    el.textContent = msg
    el.style.display = 'block'
  }

  // Allow Enter to submit on the request panel
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('panel-update').style.display !== 'none') {
        handleUpdatePassword()
      } else {
        handleRequestReset()
      }
    }
  })
</script>
</body>
</html>
